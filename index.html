<title>InventPro v4 | Plataforma Empresarial de Activos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--r:#dc2626;--rd:#b91c1c;--b:#1e40af;--bd:#1e3a8a;--bl:#3b82f6;--w:#ffffff;--bg:#f8fafc;--dk:#0f172a;--dk2:#1e293b;--g:#64748b;--gl:#e2e8f0;--ok:#059669;--wn:#d97706;--er:#dc2626}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#334155;line-height:1.6}
/* SIDEBAR */
.lay{display:flex;min-height:100vh}
.sb{width:250px;background:linear-gradient(180deg,var(--dk),var(--dk2));color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sb-hd{padding:20px;border-bottom:1px solid rgba(255,255,255,.06);text-align:center}
.sb-hd h1{font-size:1.1rem;font-weight:800;color:var(--w);letter-spacing:-.3px}
.sb-hd h1 span{color:var(--r)}
.sb-hd small{display:block;font-size:.65rem;color:#475569;text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}
.sb-usr{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
.av{width:34px;height:34px;border-radius:8px;background:var(--r);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem}
.sb-ui b{display:block;font-size:.82rem;color:#e2e8f0}.sb-ui small{color:#475569;font-size:.68rem}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.ns{padding:10px 20px 4px;font-size:.62rem;text-transform:uppercase;letter-spacing:1.5px;color:#3b5578;font-weight:700}
.ni{display:flex;align-items:center;gap:10px;padding:8px 20px;color:#7b8fa8;font-size:.84rem;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.ni:hover{color:#e2e8f0;background:rgba(255,255,255,.03)}
.ni.on{color:#fff;background:rgba(220,38,38,.15);border-left-color:var(--r)}
.ni svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.sb-ft{padding:10px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-ft button{width:100%;padding:8px;background:rgba(220,38,38,.12);color:#fca5a5;border:1px solid rgba(220,38,38,.15);border-radius:7px;cursor:pointer;font-size:.8rem;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.sb-ft button:hover{background:rgba(220,38,38,.25);color:#fff}
.sb-ft button svg{width:16px;height:16px;fill:currentColor}
/* MAIN */
.mn{flex:1;margin-left:250px;min-height:100vh}
.tb{background:var(--w);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gl);position:sticky;top:0;z-index:40}
.tb h2{font-size:1.05rem;font-weight:600;color:var(--dk2);display:flex;align-items:center;gap:8px}
.tb h2 svg{width:20px;height:20px;fill:var(--r)}
.tb-r{display:flex;align-items:center;gap:14px;font-size:.8rem;color:var(--g)}
.ct{padding:24px 28px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;letter-spacing:.2px}
.btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.12)}
.btn svg{width:15px;height:15px;fill:currentColor}
.bp{background:var(--b);color:#fff}.bp:hover{background:var(--bd)}
.br{background:var(--r);color:#fff}.br:hover{background:var(--rd)}
.bok{background:var(--ok);color:#fff}
.bwn{background:var(--wn);color:#fff}
.bgh{background:var(--g);color:#fff}
.bo{background:var(--w);border:1px solid var(--gl);color:var(--dk2)}.bo:hover{background:var(--bg)}
.bsm{padding:4px 10px;font-size:.76rem}
/* CARDS */
.card{background:var(--w);border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;margin-bottom:20px;border:1px solid #f1f5f9}
.card-h{padding:14px 20px;border-bottom:1px solid #f1f5f9;font-weight:600;font-size:.9rem;display:flex;justify-content:space-between;align-items:center;color:var(--dk2)}
.card-b{padding:18px}
/* STATS */
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:22px}
.st{background:var(--w);border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px;border:1px solid #f1f5f9}
.st-ic{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.st-ic svg{width:22px;height:22px;fill:#fff}
.st-ic.red{background:var(--r)}.st-ic.blue{background:var(--b)}.st-ic.green{background:var(--ok)}.st-ic.yellow{background:var(--wn)}.st-ic.dark{background:var(--dk2)}
.st-nf h3{font-size:1.5rem;font-weight:700;line-height:1;color:var(--dk2)}.st-nf p{font-size:.78rem;color:var(--g)}

table{width:100%;border-collapse:collapse;font-size:.84rem}
thead{background:#f8fafc}
th{padding:10px 14px;text-align:left;font-weight:700;border-bottom:2px solid #eef2f6;font-size:.72rem;text-transform:uppercase;color:var(--g);letter-spacing:.6px}
td{padding:9px 14px;border-bottom:1px solid #f5f7fa;color:var(--dk2)}
tr:hover td{background:#fafbfc}
.act{display:flex;gap:4px}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.3px}
.b-ok{background:#d1fae5;color:#065f46}.b-wn{background:#fef3c7;color:#92400e}.b-er{background:#fee2e2;color:#991b1b}.b-bl{background:#dbeafe;color:#1e40af}.b-pu{background:#ede9fe;color:#5b21b6}.b-gy{background:#f1f5f9;color:#475569}
/* FORMS */
.fg{margin-bottom:14px}.fg label{display:block;margin-bottom:5px;font-weight:600;font-size:.82rem;color:var(--dk2)}
.fc{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:7px;font-size:.86rem;font-family:inherit;background:var(--w);color:var(--dk2);transition:border .15s}
.fc:focus{outline:none;border-color:var(--bl);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.al{padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:.84rem;display:flex;align-items:center;gap:8px}
.al-d{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.al-s{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.et{color:var(--er);font-size:.76rem;margin-top:3px}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--w);padding:4px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);flex-wrap:wrap;border:1px solid #f1f5f9}
.tab{padding:7px 16px;cursor:pointer;border:none;background:none;font-size:.8rem;color:var(--g);border-radius:6px;font-family:inherit;font-weight:500}
.tab:hover{color:var(--dk2);background:#f8fafc}.tab.on{color:#fff;background:var(--r);font-weight:600}
/* ACCORDION */
.acc-i{border:1px solid #eef2f6;border-radius:8px;margin-bottom:6px;overflow:hidden}
.acc-h{padding:11px 16px;background:var(--w);cursor:pointer;font-weight:500;font-size:.86rem;display:flex;justify-content:space-between;color:var(--dk2)}
.acc-h:hover{background:#f8fafc}.acc-b{padding:14px;display:none;background:#fafbfc}.acc-i.open .acc-b{display:block}
.hid{display:none!important}
.empty{text-align:center;padding:36px;color:var(--g)}.empty svg{width:48px;height:48px;fill:#cbd5e1;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
/* AUTH */
.auth-bg{min-height:100vh;background:var(--dk);display:flex;position:relative;overflow:hidden}
.auth-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:60px;position:relative;z-index:1}
.auth-right{width:480px;display:flex;align-items:center;justify-content:center;padding:40px;background:var(--w);position:relative;z-index:1}
/* WELCOME BANNER */
.wb{background:linear-gradient(135deg,var(--b),var(--r));border-radius:10px;padding:26px;color:#fff;margin-bottom:22px;position:relative;overflow:hidden}
.wb::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%}
.wb h2{font-size:1.2rem;font-weight:700;margin-bottom:3px}.wb p{opacity:.8;font-size:.88rem}
/* LANDING */
.lp-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(15,23,42,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05)}
@media(max-width:900px){.sb{display:none}.mn{margin-left:0}.fr,.fr3{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}.auth-left{display:none}.auth-right{width:100%}.lp-nav{padding:12px 20px}}
</style>
</head>

asigs=asigs.slice().sort(function(a,b){return new Date(b.fecha_asignacion)-new Date(a.fecha_asignacion)});var ao='',eo='';for(var i=0;i<aDisp.length;i++)ao+='<option value="'+aDisp[i].id+'">'+esc(aDisp[i].nombre)+' | '+esc(aDisp[i].serial)+'</option>';for(var j=0;j<emps.length;j++)eo+='<option value="'+emps[j].id+'">'+esc(emps[j].nombre)+' '+esc(emps[j].apellido)+'</option>';var rows='';if(!asigs.length)rows='<div class="empty">No hay asignaciones</div>';else{rows='<table><thead><tr><th>Activo</th><th>Empleado</th><th>Sede</th><th>Fecha</th><th>Estado</th><th>Notas</th>'+(adm?'<th></th>':'')+'</tr></thead><tbody>';for(var k=0;k<asigs.length;k++){var x=asigs[k],act=DB.gAi(x.activo_id),emp=DB.gEi(x.empleado_id);var est=x.fecha_devolucion?'<span class="badge b-ok">Devuelta</span><br><small>'+fd(x.fecha_devolucion)+'</small>':'<span class="badge b-wn">Activa</span>';var acc=(!x.fecha_devolucion&&canA)?'<button class="btn bok bsm dv" data-id="'+x.id+'">'+ic('ret',14)+' Devolver</button>':'';rows+='<tr><td>'+(act?'<b>'+esc(act.nombre)+'</b><br><small style="color:var(--g)">'+esc(act.serial)+'</small>':'?')+'</td><td>'+(emp?esc(emp.nombre)+' '+esc(emp.apellido):'?')+'</td><td>'+(act?sn(act.sede_id):'-')+'</td><td>'+fdt(x.fecha_asignacion)+'</td><td>'+est+'</td><td style="max-width:150px">'+(x.observaciones?esc(x.observaciones):'-')+'</td>'+(canA?'<td>'+acc+'</td>':'')+'</tr>'}rows+='</tbody></table>'}
var formH='';if(canA){formH='<div class="card" style="margin-bottom:20px"><div class="card-h">Nueva Asignacion</div><div class="card-b"><div id="ase" class="al al-d hid"></div><form id="asf"><div class="fr3"><div class="fg"><label>Activo disponible</label><select class="fc" id="asa">'+(aDisp.length?'<option value="">Seleccione...</option>'+ao:'<option value="">Sin disponibles</option>')+'</select></div><div class="fg"><label>Empleado</label><select class="fc" id="ase2">'+(emps.length?'<option value="">Seleccione...</option>'+eo:'<option value="">Sin empleados</option>')+'</select></div><div class="fg"><label>Observaciones</label><input type="text" class="fc" id="aso" placeholder="Opcional"></div></div><button type="submit" class="btn bp"'+(aDisp.length===0||emps.length===0?' disabled':'')+'>Registrar</button></form></div></div>'}
c.innerHTML='<div class="ph"><h2>Asignaciones ('+asigs.length+')</h2></div>'+formH+'<div class="card"><div class="card-b" style="padding:0;overflow-x:auto">'+rows+'</div></div>';
if($('asf'))$('asf').onsubmit=function(ev){ev.preventDefault();var aid=+$('asa').value,eid=+$('ase2').value,obs=$('aso').value.trim();var er=$('ase');if(!aid||!eid){er.textContent='Seleccione activo y empleado.';er.className='al al-d';return}var act=DB.gAi(aid);if(!act||act.estado!=='DISPONIBLE'){er.textContent='Activo no disponible.';er.className='al al-d';return}DB.cG({activo_id:aid,empleado_id:eid,observaciones:obs});DB.uA(aid,{estado:'ASIGNADO'});self.notify('Asignacion registrada','ok');logAct('Asignacion',act.nombre);self.go('asignaciones')};
document.querySelectorAll('.dv').forEach(function(b){b.onclick=function(){if(!confirm('Confirmar devolucion?'))return;var id=+b.getAttribute('data-id'),asig=DB.gGi(id);if(!asig)return;DB.uG(id,{fecha_devolucion:new Date().toISOString()});DB.uA(asig.activo_id,{estado:'DISPONIBLE'});self.notify('Devolucion registrada','ok');logAct('Devolucion',DB.gAi(asig.activo_id).nombre);self.go('asignaciones')}})},

// REPORTES
pg_reportes:function(c){var act=this.filtrar(DB.gA()),asigs=DB.gG(),emps=this.filtrar(DB.gE()),sedes=DB.gS(),self=this,canA=this.canAdd();var disp=[],asig=[],dan=[],vt=0;for(var i=0;i<act.length;i++){vt+=act[i].valor;if(act[i].estado==='DISPONIBLE')disp.push(act[i]);else if(act[i].estado==='ASIGNADO')asig.push(act[i]);else dan.push(act[i])}
var tD=!disp.length?'<div class="empty">Sin disponibles</div>':'<table><thead><tr><th>Nombre</th><th>Tipo</th><th>Serial</th><th>Valor</th><th>Sede</th></tr></thead><tbody>'+disp.map(function(a){return'<tr><td>'+esc(a.nombre)+'</td><td>'+esc(a.tipo)+'</td><td><code>'+esc(a.serial)+'</code></td><td>'+fc(a.valor)+'</td><td>'+sn(a.sede_id)+'</td></tr>'}).join('')+'</tbody></table>';
var tA=!asig.length?'<div class="empty">Sin asignados</div>':'<table><thead><tr><th>Nombre</th><th>Serial</th><th>Valor</th><th>Empleado</th><th>Sede</th></tr></thead><tbody>'+asig.map(function(a){var x=null;for(var z=0;z<asigs.length;z++)if(asigs[z].activo_id===a.id&&!asigs[z].fecha_devolucion){x=asigs[z];break}var emp=x?DB.gEi(x.empleado_id):null;return'<tr><td>'+esc(a.nombre)+'</td><td><code>'+esc(a.serial)+'</code></td><td>'+fc(a.valor)+'</td><td>'+(emp?esc(emp.nombre)+' '+esc(emp.apellido):'-')+'</td><td>'+sn(a.sede_id)+'</td></tr>'}).join('')+'</tbody></table>';
var tN=!dan.length?'<div class="empty">Sin activos en reparacion</div>':'<table><thead><tr><th>Nombre</th><th>Tipo</th><th>Serial</th><th>Valor</th></tr></thead><tbody>'+dan.map(function(a){return'<tr><td>'+esc(a.nombre)+'</td><td>'+esc(a.tipo)+'</td><td><code>'+esc(a.serial)+'</code></td><td>'+fc(a.valor)+'</td></tr>'}).join('')+'</tbody></table>';
var tS='';for(var s=0;s<sedes.length;s++){var sd=sedes[s],sa=act.filter(function(a){return a.sede_id===sd.id}),sv=0;for(var v=0;v<sa.length;v++)sv+=sa[v].valor;if(sa.length)tS+='<div class="acc-i"><div class="acc-h">'+esc(sd.nombre)+' ('+esc(sd.ciudad)+') â€” '+sa.length+' activos â€” '+fc(sv)+' <span>&#9660;</span></div><div class="acc-b"><table><thead><tr><th>Activo</th><th>Tipo</th><th>Estado</th><th>Valor</th></tr></thead><tbody>'+sa.map(function(a){return'<tr><td>'+esc(a.nombre)+'</td><td>'+esc(a.tipo)+'</td><td>'+eb(a.estado)+'</td><td>'+fc(a.valor)+'</td></tr>'}).join('')+'</tbody></table></div></div>'}
if(!tS)tS='<div class="empty">Sin datos</div>';
var tE='';for(var m=0;m<emps.length;m++){var emp=emps[m],eh=asigs.filter(function(a){return a.empleado_id===emp.id});if(eh.length){var ecnt=eh.filter(function(a){return!a.fecha_devolucion}).length;tE+='<div class="acc-i"><div class="acc-h">'+esc(emp.nombre)+' '+esc(emp.apellido)+' â€” '+ecnt+' activos â€” '+eh.length+' historial <span>&#9660;</span></div><div class="acc-b"><table><thead><tr><th>Activo</th><th>Asignacion</th><th>Devolucion</th><th>Estado</th></tr></thead><tbody>'+eh.sort(function(a,b){return new Date(b.fecha_asignacion)-new Date(a.fecha_asignacion)}).map(function(h){var ha=DB.gAi(h.activo_id);return'<tr><td>'+(ha?esc(ha.nombre):'?')+'</td><td>'+fdt(h.fecha_asignacion)+'</td><td>'+(h.fecha_devolucion?fdt(h.fecha_devolucion):'-')+'</td><td>'+(h.fecha_devolucion?'<span class="badge b-ok">Devuelto</span>':'<span class="badge b-wn">Activo</span>')+'</td></tr>'}).join('')+'</tbody></table></div></div>'}}
if(!tE)tE='<div class="empty">Sin historial</div>';
c.innerHTML='<div class="ph"><h2>Reportes</h2>'+(canA?'<button class="btn bok" id="expCSV">'+ic('save',14)+' Exportar CSV</button>':'')+'</div><div class="g4"><div class="st"><div class="st-ic green">'+ic('money')+'</div><div class="st-nf"><h3 style="font-size:1rem">'+fc(vt)+'</h3><p>Valor total</p></div></div><div class="st"><div class="st-ic blue">'+ic('pc')+'</div><div class="st-nf"><h3>'+act.length+'</h3><p>Total activos</p></div></div><div class="st"><div class="st-ic yellow">'+ic('swap')+'</div><div class="st-nf"><h3>'+asigs.length+'</h3><p>Asignaciones</p></div></div><div class="st"><div class="st-ic red">'+ic('ppl')+'</div><div class="st-nf"><h3>'+emps.length+'</h3><p>Empleados</p></div></div></div><div class="tabs"><button class="tab on" data-r="d">Disponibles ('+disp.length+')</button><button class="tab" data-r="a">Asignados ('+asig.length+')</button><button class="tab" data-r="n">Reparacion ('+dan.length+')</button><button class="tab" data-r="s">Por Sede</button><button class="tab" data-r="e">Por Empleado</button></div><div class="card"><div class="card-b"><div id="rd" class="rs">'+tD+'</div><div id="ra" class="rs hid">'+tA+'</div><div id="rn" class="rs hid">'+tN+'</div><div id="rse" class="rs hid">'+tS+'</div><div id="rem" class="rs hid">'+tE+'</div></div></div>';
document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){document.querySelectorAll('.tab').forEach(function(x){x.className='tab'});t.className='tab on';document.querySelectorAll('.rs').forEach(function(s){s.className='rs hid'});var map={d:'rd',a:'ra',n:'rn',s:'rse',e:'rem'};$(map[t.getAttribute('data-r')]).className='rs'}});
document.querySelectorAll('.acc-h').forEach(function(h){h.onclick=function(){h.parentElement.classList.toggle('open')}});
if($('expCSV'))$('expCSV').onclick=function(){exportCSV('activos_reporte.csv',['Nombre','Tipo','Serial','Valor','Estado','Sede','Depto'],act.map(function(a){return[a.nombre,a.tipo,a.serial,a.valor,a.estado,sn(a.sede_id),dn(a.departamento_id)]}));self.notify('CSV exportado','ok');logAct('Exportar CSV','Reporte')}},

// USUARIOS (solo ADMIN)
pg_usuarios:function(c){if(!this.isAdmin()){c.innerHTML='<div class="al al-d">Solo el administrador puede gestionar usuarios.</div>';return}
var u=DB.gU(),self=this,r='';
r='<table><thead><tr><th>Usuario</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Sede</th><th></th></tr></thead><tbody>';for(var i=0;i<u.length;i++){var x=u[i];r+='<tr><td><b>'+esc(x.username)+'</b></td><td>'+esc(x.nombre||'')+' '+esc(x.apellido||'')+'</td><td>'+esc(x.email)+'</td><td><span class="badge '+(x.rol==='ADMIN'?'b-er':'b-bl')+'">'+x.rol+'</span></td><td>'+sn(x.sede_id)+'</td><td class="act"><button class="btn br bsm du" data-id="'+x.id+'">'+ic('del',14)+'</button></td></tr>'}r+='</tbody></table>';
var sedes=DB.gS();var so='';for(var j=0;j<sedes.length;j++)so+='<option value="'+sedes[j].id+'">'+esc(sedes[j].nombre)+'</option>';
c.innerHTML='<div class="ph"><h2>Usuarios del Sistema ('+u.length+')</h2></div><div class="card" style="margin-bottom:20px"><div class="card-h">Crear Nuevo Usuario</div><div class="card-b"><div id="ue" class="al al-d hid"></div><form id="uf"><div class="fr3"><div class="fg"><label>Usuario</label><input type="text" class="fc" id="uu" required></div><div class="fg"><label>Email</label><input type="email" class="fc" id="uem" required></div><div class="fg"><label>Contrasena</label><input type="password" class="fc" id="upw" required></div></div><div class="fr3"><div class="fg"><label>Nombre</label><input type="text" class="fc" id="unm"></div><div class="fg"><label>Apellido</label><input type="text" class="fc" id="uap"></div><div class="fg"><label>Rol</label><select class="fc" id="url"><option value="OPERADOR">Operador (solo agregar)</option><option value="ADMIN">Administrador (acceso total)</option></select></div></div><div class="fg"><label>Sede (para operadores)</label><select class="fc" id="usd"><option value="">Sin sede</option>'+so+'</select></div><button type="submit" class="btn bp">'+ic('add',14)+' Crear Usuario</button></form></div></div><div class="card"><div class="card-b" style="padding:0;overflow-x:auto">'+r+'</div></div>';
$('uf').onsubmit=function(ev){ev.preventDefault();var er=$('ue');var d={username:$('uu').value.trim(),email:$('uem').value.trim(),password:$('upw').value,nombre:$('unm').value.trim(),apellido:$('uap').value.trim(),rol:$('url').value,sede_id:+$('usd').value||null};if(!d.username||!d.email||!d.password){er.textContent='Complete usuario, email y contrasena.';er.className='al al-d';return}if(d.password.length<6){er.textContent='Contrasena minimo 6 caracteres.';er.className='al al-d';return}if(DB.gUn(d.username)){er.textContent='Usuario ya existe.';er.className='al al-d';return}DB.cU(d);self.notify('Usuario creado: '+d.username,'ok');logAct('Usuario creado',d.username);self.go('usuarios')};
document.querySelectorAll('.du').forEach(function(b){b.onclick=function(){var id=+b.getAttribute('data-id');if(id===self.user.id){alert('No puede eliminar su propia cuenta.');return}if(confirm('Eliminar usuario?')){DB.s('u',DB.gU().filter(function(x){return x.id!==id}));self.notify('Usuario eliminado','er');logAct('Usuario eliminado','ID '+id);self.go('usuarios')}}})},

// ACTIVIDAD (solo ADMIN)
pg_actividad:function(c){if(!this.isAdmin()){c.innerHTML='<div class="al al-d">Solo el administrador puede ver la actividad.</div>';return}
var log=getLog(),self=this,r='';
if(!log.length)r='<div class="empty">Sin actividad registrada</div>';
else{r='<table><thead><tr><th>Fecha</th><th>Usuario</th><th>Accion</th><th>Detalle</th></tr></thead><tbody>';for(var i=0;i<Math.min(log.length,100);i++){var x=log[i];r+='<tr><td>'+fdt(x.fecha)+'</td><td><b>'+esc(x.user)+'</b></td><td><span class="badge b-bl">'+esc(x.action)+'</span></td><td>'+esc(x.detail)+'</td></tr>'}r+='</tbody></table>'}
c.innerHTML='<div class="ph"><h2>Registro de Actividad</h2><button class="btn bo" id="clrLog">Limpiar log</button></div><div class="card"><div class="card-b" style="padding:0;overflow-x:auto">'+r+'</div></div>';
if($('clrLog'))$('clrLog').onclick=function(){if(confirm('Limpiar todo el registro?')){DB.s('log',[]);self.notify('Log limpiado','ok');self.go('actividad')}}}
};
