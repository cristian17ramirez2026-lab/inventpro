<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InventPro v3 | Gestion de Activos Empresariales</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--c1:#0e7490;--c2:#0891b2;--c3:#06b6d4;--c4:#155e75;--ac:#f97316;--ac2:#ea580c;--ok:#059669;--wn:#d97706;--er:#dc2626;--dk:#0c1222;--dk2:#151d2e;--dk3:#1e293b;--tx:#334155;--tx2:#64748b;--gl:#e2e8f0;--bg:#f0f4f8;--wh:#ffffff;--r:10px;--sh:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}

/* SIDEBAR */
.lay{display:flex;min-height:100vh}
.sb{width:250px;background:linear-gradient(180deg,var(--dk) 0%,var(--dk2) 100%);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sb-hd{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-hd h1{font-size:1.05rem;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.sb-hd h1 svg{width:22px;height:22px;fill:var(--c3)}
.sb-hd small{display:block;font-size:.68rem;color:#475569;text-transform:uppercase;letter-spacing:1.2px;margin-top:2px}
.sb-usr{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
.av{width:34px;height:34px;border-radius:8px;background:var(--c1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:#fff}
.sb-ui b{display:block;font-size:.82rem;color:#e2e8f0}.sb-ui small{color:#475569;font-size:.7rem}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.ns{padding:10px 20px 4px;font-size:.64rem;text-transform:uppercase;letter-spacing:1.5px;color:#3b5578;font-weight:700}
.ni{display:flex;align-items:center;gap:10px;padding:8px 20px;color:#7b8fa8;font-size:.84rem;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.ni:hover{color:#e2e8f0;background:rgba(255,255,255,.03)}
.ni.on{color:#fff;background:rgba(14,116,144,.2);border-left-color:var(--c3)}
.ni svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.sb-ft{padding:10px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-ft button{width:100%;padding:8px;background:rgba(220,38,38,.1);color:#fca5a5;border:1px solid rgba(220,38,38,.15);border-radius:7px;cursor:pointer;font-size:.8rem;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.sb-ft button:hover{background:rgba(220,38,38,.2);color:#fff}
.sb-ft button svg{width:16px;height:16px;fill:currentColor}

/* MAIN */
.mn{flex:1;margin-left:250px;min-height:100vh}
.tb{background:var(--wh);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gl);position:sticky;top:0;z-index:40}
.tb h2{font-size:1.05rem;font-weight:600;color:var(--dk3);display:flex;align-items:center;gap:8px}
.tb h2 svg{width:20px;height:20px;fill:var(--c1)}
.tb-r{display:flex;align-items:center;gap:14px;font-size:.8rem;color:var(--tx2)}
.ct{padding:24px 28px}

/* COMPONENTS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s;letter-spacing:.2px}
.btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.12)}
.btn svg{width:15px;height:15px;fill:currentColor}
.bp{background:var(--c1);color:#fff}.bp:hover{background:var(--c4)}
.bac{background:var(--ac);color:#fff}.bac:hover{background:var(--ac2)}
.bok{background:var(--ok);color:#fff}
.bwn{background:var(--wn);color:#fff}
.ber{background:var(--er);color:#fff}
.bgh{background:var(--tx2);color:#fff}
.bo{background:var(--wh);border:1px solid var(--gl);color:var(--tx)}.bo:hover{background:var(--bg)}
.bsm{padding:4px 10px;font-size:.76rem}

.card{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh2);overflow:hidden;margin-bottom:20px}
.card-h{padding:14px 20px;border-bottom:1px solid #f1f5f9;font-weight:600;font-size:.9rem;display:flex;justify-content:space-between;align-items:center;color:var(--dk3)}
.card-b{padding:18px}

.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:22px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.st{background:var(--wh);border-radius:var(--r);padding:18px;box-shadow:var(--sh2);display:flex;align-items:center;gap:14px}
.st-ic{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.st-ic svg{width:22px;height:22px;fill:#fff}
.st-ic.tl{background:var(--c1)}.st-ic.ok{background:var(--ok)}.st-ic.wn{background:var(--wn)}.st-ic.er{background:var(--er)}.st-ic.ac{background:var(--ac)}.st-ic.pu{background:#7c3aed}
.st-nf h3{font-size:1.5rem;font-weight:700;line-height:1;color:var(--dk3)}.st-nf p{font-size:.78rem;color:var(--tx2)}

table{width:100%;border-collapse:collapse;font-size:.84rem}
thead{background:#f8fafc}
th{padding:10px 14px;text-align:left;font-weight:700;border-bottom:2px solid #eef2f6;font-size:.72rem;text-transform:uppercase;color:var(--tx2);letter-spacing:.6px}
td{padding:9px 14px;border-bottom:1px solid #f5f7fa;color:var(--tx)}
tr:hover td{background:#fafbfc}
.act{display:flex;gap:4px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.3px}
.b-ok{background:#d1fae5;color:#065f46}.b-wn{background:#fef3c7;color:#92400e}.b-er{background:#fee2e2;color:#991b1b}.b-bl{background:#dbeafe;color:#1e40af}.b-pu{background:#ede9fe;color:#5b21b6}.b-gy{background:#f1f5f9;color:#475569}.b-ac{background:#ffedd5;color:#9a3412}

.fg{margin-bottom:14px}.fg label{display:block;margin-bottom:5px;font-weight:600;font-size:.82rem;color:var(--dk3)}
.fc{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:7px;font-size:.86rem;font-family:inherit;background:var(--wh);color:var(--tx);transition:border .15s}
.fc:focus{outline:none;border-color:var(--c2);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.al{padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:.84rem;display:flex;align-items:center;gap:8px}
.al-d{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.al-s{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.et{color:var(--er);font-size:.76rem;margin-top:3px}

.tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--wh);padding:4px;border-radius:8px;box-shadow:var(--sh);flex-wrap:wrap}
.tab{padding:7px 16px;cursor:pointer;border:none;background:none;font-size:.8rem;color:var(--tx2);border-radius:6px;font-family:inherit;font-weight:500}
.tab:hover{color:var(--dk3);background:#f8fafc}.tab.on{color:#fff;background:var(--c1);font-weight:600}

.acc-i{border:1px solid #eef2f6;border-radius:8px;margin-bottom:6px;overflow:hidden}
.acc-h{padding:11px 16px;background:var(--wh);cursor:pointer;font-weight:500;font-size:.86rem;display:flex;justify-content:space-between;color:var(--dk3)}
.acc-h:hover{background:#f8fafc}.acc-b{padding:14px;display:none;background:#fafbfc}.acc-i.open .acc-b{display:block}
.hid{display:none!important}
.empty{text-align:center;padding:36px;color:var(--tx2)}.empty svg{width:48px;height:48px;fill:#cbd5e1;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}

/* AUTH */
.auth-bg{min-height:100vh;background:var(--dk);display:flex;position:relative;overflow:hidden}
.auth-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:60px;color:#fff;position:relative;z-index:1}
.auth-left h1{font-size:2.2rem;font-weight:800;margin-bottom:12px;line-height:1.2}
.auth-left h1 span{color:var(--c3)}
.auth-left p{color:#7b8fa8;font-size:1rem;max-width:420px;line-height:1.7}
.auth-features{margin-top:36px;display:flex;flex-direction:column;gap:14px}
.auth-feat{display:flex;align-items:center;gap:12px;color:#94a3b8;font-size:.9rem}
.auth-feat .af-ic{width:36px;height:36px;border-radius:8px;background:rgba(14,116,144,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.auth-feat .af-ic svg{width:18px;height:18px;fill:var(--c3)}
.auth-right{width:480px;display:flex;align-items:center;justify-content:center;padding:40px;position:relative;z-index:1}
.auth-card{background:var(--wh);border-radius:16px;padding:36px;width:100%;box-shadow:0 25px 80px rgba(0,0,0,.25)}
.auth-card h2{font-size:1.2rem;font-weight:700;color:var(--dk3);margin-bottom:4px}
.auth-card .sub{font-size:.84rem;color:var(--tx2);margin-bottom:22px}
.auth-link{text-align:center;margin-top:16px;font-size:.84rem;color:var(--tx2)}
.auth-link a{color:var(--c1);text-decoration:none;font-weight:600;cursor:pointer}
.auth-link a:hover{text-decoration:underline}
.info-box{margin-top:16px;padding:14px;background:#f0fdfa;border:1px solid #99f6e4;border-radius:8px;font-size:.78rem;color:#0f766e}
.auth-bg .deco{position:absolute;border-radius:50%;opacity:.04;background:#fff}
.deco-1{width:500px;height:500px;top:-200px;right:-100px}.deco-2{width:300px;height:300px;bottom:-100px;left:30%}

.wb{background:linear-gradient(135deg,var(--c4),var(--c1));border-radius:var(--r);padding:26px;color:#fff;margin-bottom:22px;position:relative;overflow:hidden}
.wb::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%}
.wb h2{font-size:1.2rem;font-weight:700;margin-bottom:3px}.wb p{opacity:.8;font-size:.88rem}

@media(max-width:900px){.sb{display:none}.mn{margin-left:0}.fr,.fr3{grid-template-columns:1fr}.g4,.g3{grid-template-columns:1fr 1fr}.auth-left{display:none}.auth-right{width:100%}.lp-hero{flex-direction:column;text-align:center;padding:40px 20px}.lp-hero-txt{max-width:100%}.lp-features{grid-template-columns:1fr}.lp-stats{grid-template-columns:1fr 1fr}.lp-nav{padding:0 20px}}

/* LANDING PAGE */
.lp-nav{display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:64px;background:rgba(12,18,34,.95);backdrop-filter:blur(10px);position:fixed;top:0;left:0;right:0;z-index:200;border-bottom:1px solid rgba(255,255,255,.06)}
.lp-nav-brand{display:flex;align-items:center;gap:8px;color:#fff;font-weight:700;font-size:1.1rem}
.lp-nav-brand svg{fill:var(--c3)}
.lp-nav-links{display:flex;gap:6px}
.lp-nav-links a{color:#94a3b8;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:.86rem;cursor:pointer}
.lp-nav-links a:hover{color:#fff;background:rgba(255,255,255,.08)}
.lp-nav-btns{display:flex;gap:8px}
.lp-hero{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,var(--dk) 0%,#0a1628 40%,#0c2135 100%);padding:80px 60px;gap:60px;position:relative;overflow:hidden}
.lp-hero::before{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(6,182,212,.08),transparent 70%);top:-250px;right:-150px}
.lp-hero::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(249,115,22,.05),transparent 70%);bottom:-200px;left:-100px}
.lp-hero-txt{max-width:560px;position:relative;z-index:1}
.lp-hero-txt .tag{display:inline-block;background:rgba(6,182,212,.15);color:var(--c3);padding:4px 14px;border-radius:20px;font-size:.76rem;font-weight:600;letter-spacing:.5px;margin-bottom:18px;border:1px solid rgba(6,182,212,.2)}
.lp-hero-txt h1{font-size:2.8rem;font-weight:800;color:#fff;line-height:1.15;margin-bottom:16px}
.lp-hero-txt h1 span{background:linear-gradient(135deg,var(--c3),var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lp-hero-txt p{color:#7b8fa8;font-size:1.05rem;line-height:1.7;margin-bottom:28px}
.lp-hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.lp-hero-btns .btn{padding:12px 28px;font-size:.92rem;border-radius:8px}
.lp-hero-visual{position:relative;z-index:1}
.lp-mock{background:var(--dk2);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;width:420px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.lp-mock-bar{display:flex;gap:6px;margin-bottom:14px}.lp-mock-dot{width:10px;height:10px;border-radius:50%;background:#334155}.lp-mock-dot:first-child{background:#ef4444}.lp-mock-dot:nth-child(2){background:#f59e0b}.lp-mock-dot:nth-child(3){background:#22c55e}
.lp-mock-row{display:flex;gap:10px;margin-bottom:10px}
.lp-mock-card{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:14px;text-align:center}
.lp-mock-card h4{color:var(--c3);font-size:1.3rem;margin-bottom:2px}.lp-mock-card p{color:#475569;font-size:.72rem}
.lp-mock-table{width:100%;margin-top:10px}
.lp-mock-table div{display:flex;justify-content:space-between;padding:6px 10px;border-radius:4px;margin-bottom:4px;font-size:.74rem;color:#7b8fa8}
.lp-mock-table div:nth-child(odd){background:rgba(255,255,255,.02)}

.lp-section{padding:80px 60px;text-align:center}
.lp-section h2{font-size:1.8rem;font-weight:700;color:var(--dk3);margin-bottom:8px}
.lp-section .sub2{color:var(--tx2);font-size:1rem;margin-bottom:40px;max-width:600px;margin-left:auto;margin-right:auto}
.lp-features{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:1000px;margin:0 auto}
.lp-feat{background:var(--wh);border-radius:12px;padding:28px;box-shadow:var(--sh2);text-align:left;border:1px solid #f1f5f9;transition:transform .2s}
.lp-feat:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.lp-feat-ic{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.lp-feat-ic svg{fill:#fff;width:22px;height:22px}
.lp-feat-ic.f1{background:var(--c1)}.lp-feat-ic.f2{background:var(--ac)}.lp-feat-ic.f3{background:var(--ok)}.lp-feat-ic.f4{background:#7c3aed}.lp-feat-ic.f5{background:var(--wn)}.lp-feat-ic.f6{background:var(--er)}
.lp-feat h3{font-size:.95rem;font-weight:700;color:var(--dk3);margin-bottom:6px}
.lp-feat p{font-size:.84rem;color:var(--tx2);line-height:1.6}

.lp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;max-width:900px;margin:0 auto 40px}
.lp-stat{text-align:center}
.lp-stat h3{font-size:2.2rem;font-weight:800;color:var(--c1)}.lp-stat p{color:var(--tx2);font-size:.86rem}

.lp-cta{background:linear-gradient(135deg,var(--dk),var(--dk2));padding:60px;text-align:center;color:#fff}
.lp-cta h2{font-size:1.6rem;font-weight:700;margin-bottom:8px}
.lp-cta p{color:#7b8fa8;margin-bottom:24px;font-size:.95rem}
.lp-cta .btn{padding:14px 32px;font-size:.95rem}
</style>
</head>
<body>
<div id="auth"></div>
<div id="app"></div>

s</option>')+'</select></div><div class="fg"><label>Empleado</label><select class="fc" id="ase2">'+(emps.length?'<option value="">Seleccione...</option>'+eo:'<option value="">Sin empleados</option>')+'</select></div><div class="fg"><label>Observaciones</label><input type="text" class="fc" id="aso" placeholder="Opcional"></div></div><button type="submit" class="btn bp"'+(aDisp.length===0||emps.length===0?' disabled':'')+'>'+ic('check',14)+' Registrar</button></form></div></div>'}c.innerHTML='<div class="ph"><h2>Asignaciones ('+asigs.length+')</h2></div>'+formH+'<div class="card"><div class="card-b" style="padding:0;overflow-x:auto">'+rows+'</div></div>';if($('asf'))$('asf').onsubmit=function(ev){ev.preventDefault();var aid=+$('asa').value,eid=+$('ase2').value,obs=$('aso').value.trim();var er=$('ase');if(!aid||!eid){er.textContent='Seleccione activo y empleado.';er.className='al al-d';return}var act=DB.gAi(aid);if(!act||act.estado!=='DISPONIBLE'){er.textContent='Activo no disponible.';er.className='al al-d';return}DB.cG({activo_id:aid,empleado_id:eid,observaciones:obs});DB.uA(aid,{estado:'ASIGNADO'});self.notify('Activo asignado correctamente','ok');logAct('Asignacion',DB.gAi(aid).nombre+' -> '+DB.gEi(eid).nombre);self.go('asignaciones')};document.querySelectorAll('.dv').forEach(function(b){b.onclick=function(){if(!confirm('Confirmar devolucion?'))return;var id=+b.getAttribute('data-id'),asig=DB.gGi(id);if(!asig)return;DB.uG(id,{fecha_devolucion:new Date().toISOString()});DB.uA(asig.activo_id,{estado:'DISPONIBLE'});self.notify('Devolucion registrada','ok');logAct('Devolucion',DB.gAi(asig.activo_id).nombre);self.go('asignaciones')}})},

  // REPORTES
  pg_reportes:function(c){var act=DB.gA(),asigs=DB.gG(),emps=DB.gE(),sedes=DB.gS(),self=this;var disp=[],asig=[],dan=[],vt=0;for(var i=0;i<act.length;i++){vt+=act[i].valor;if(act[i].estado==='DISPONIBLE')disp.push(act[i]);else if(act[i].estado==='ASIGNADO')asig.push(act[i]);else dan.push(act[i])}
    var tD=!disp.length?'<div class="empty">Sin activos disponibles</div>':'<table><thead><tr><th>Nombre</th><th>Tipo</th><th>Serial</th><th>Valor</th><th>Sede</th></tr></thead><tbody>'+disp.map(function(a){return'<tr><td>'+esc(a.nombre)+'</td><td>'+esc(a.tipo)+'</td><td><code>'+esc(a.serial)+'</code></td><td>'+fc(a.valor)+'</td><td>'+sn(a.sede_id)+'</td></tr>'}).join('')+'</tbody></table>';
    var tA=!asig.length?'<div class="empty">Sin activos asignados</div>':'<table><thead><tr><th>Nombre</th><th>Serial</th><th>Valor</th><th>Empleado</th><th>Sede</th></tr></thead><tbody>'+asig.map(function(a){var x=null;for(var z=0;z<asigs.length;z++)if(asigs[z].activo_id===a.id&&!asigs[z].fecha_devolucion){x=asigs[z];break}var emp=x?DB.gEi(x.empleado_id):null;return'<tr><td>'+esc(a.nombre)+'</td><td><code>'+esc(a.serial)+'</code></td><td>'+fc(a.valor)+'</td><td>'+(emp?esc(emp.nombre)+' '+esc(emp.apellido):'-')+'</td><td>'+sn(a.sede_id)+'</td></tr>'}).join('')+'</tbody></table>';
    var tN=!dan.length?'<div class="empty">Sin activos en reparacion</div>':'<table><thead><tr><th>Nombre</th><th>Tipo</th><th>Serial</th><th>Valor</th></tr></thead><tbody>'+dan.map(function(a){return'<tr><td>'+esc(a.nombre)+'</td><td>'+esc(a.tipo)+'</td><td><code>'+esc(a.serial)+'</code></td><td>'+fc(a.valor)+'</td></tr>'}).join('')+'</tbody></table>';
    var tS='';for(var s=0;s<sedes.length;s++){var sd=sedes[s],sa=act.filter(function(a){return a.sede_id===sd.id}),sv=0;for(var v=0;v<sa.length;v++)sv+=sa[v].valor;if(sa.length)tS+='<div class="acc-i"><div class="acc-h">'+esc(sd.nombre)+' ('+esc(sd.ciudad)+') — '+sa.length+' activos — '+fc(sv)+' <span>&#9660;</span></div><div class="acc-b"><table><thead><tr><th>Activo</th><th>Tipo</th><th>Estado</th><th>Valor</th></tr></thead><tbody>'+sa.map(function(a){return'<tr><td>'+esc(a.nombre)+'</td><td>'+esc(a.tipo)+'</td><td>'+eb(a.estado)+'</td><td>'+fc(a.valor)+'</td></tr>'}).join('')+'</tbody></table></div></div>'}
    if(!tS)tS='<div class="empty">Sin datos por sede</div>';
    var tE='';for(var m=0;m<emps.length;m++){var emp=emps[m],eh=asigs.filter(function(a){return a.empleado_id===emp.id});var ecnt=eh.filter(function(a){return!a.fecha_devolucion}).length;if(eh.length)tE+='<div class="acc-i"><div class="acc-h">'+esc(emp.nombre)+' '+esc(emp.apellido)+' — '+ecnt+' activos — '+eh.length+' historial <span>&#9660;</span></div><div class="acc-b"><table><thead><tr><th>Activo</th><th>Asignacion</th><th>Devolucion</th><th>Estado</th></tr></thead><tbody>'+eh.sort(function(a,b){return new Date(b.fecha_asignacion)-new Date(a.fecha_asignacion)}).map(function(h){var ha=DB.gAi(h.activo_id);return'<tr><td>'+(ha?esc(ha.nombre):'?')+'</td><td>'+fdt(h.fecha_asignacion)+'</td><td>'+(h.fecha_devolucion?fdt(h.fecha_devolucion):'-')+'</td><td>'+(h.fecha_devolucion?'<span class="badge b-ok">Devuelto</span>':'<span class="badge b-wn">Activo</span>')+'</td></tr>'}).join('')+'</tbody></table></div></div>'}
    if(!tE)tE='<div class="empty">Sin historial</div>';
    c.innerHTML='<div class="ph"><h2>Reportes</h2><button class="btn bok" id="expCSV">'+ic('save',14)+' Exportar CSV</button></div><div class="g4"><div class="st"><div class="st-ic ok">'+ic('money')+'</div><div class="st-nf"><h3 style="font-size:1rem">'+fc(vt)+'</h3><p>Valor total inventario</p></div></div><div class="st"><div class="st-ic tl">'+ic('pc')+'</div><div class="st-nf"><h3>'+act.length+'</h3><p>Total activos</p></div></div><div class="st"><div class="st-ic wn">'+ic('swap')+'</div><div class="st-nf"><h3>'+asigs.length+'</h3><p>Total asignaciones</p></div></div><div class="st"><div class="st-ic pu">'+ic('ppl')+'</div><div class="st-nf"><h3>'+emps.length+'</h3><p>Total empleados</p></div></div></div><div class="tabs"><button class="tab on" data-r="d">Disponibles ('+disp.length+')</button><button class="tab" data-r="a">Asignados ('+asig.length+')</button><button class="tab" data-r="n">Reparacion ('+dan.length+')</button><button class="tab" data-r="s">Por Sede</button><button class="tab" data-r="e">Por Empleado</button></div><div class="card"><div class="card-b"><div id="rd" class="rs">'+tD+'</div><div id="ra" class="rs hid">'+tA+'</div><div id="rn" class="rs hid">'+tN+'</div><div id="rse" class="rs hid">'+tS+'</div><div id="rem" class="rs hid">'+tE+'</div></div></div>';
    document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){document.querySelectorAll('.tab').forEach(function(x){x.className='tab'});t.className='tab on';document.querySelectorAll('.rs').forEach(function(s){s.className='rs hid'});var map={d:'rd',a:'ra',n:'rn',s:'rse',e:'rem'};$(map[t.getAttribute('data-r')]).className='rs'}});
    document.querySelectorAll('.acc-h').forEach(function(h){h.onclick=function(){h.parentElement.classList.toggle('open')}});
    // Export CSV
    if($('expCSV'))$('expCSV').onclick=function(){var rows=act.map(function(a){return[a.nombre,a.tipo,a.serial,a.valor,a.estado,sn(a.sede_id),dn(a.departamento_id),a.fecha_compra]});exportCSV('activos_reporte.csv',['Nombre','Tipo','Serial','Valor','Estado','Sede','Departamento','Fecha Compra'],rows);self.notify('CSV exportado','ok');logAct('Exportar CSV','Reporte de activos')};
  },

  // ACTIVIDAD (log)
  pg_actividad:function(c){
    if(!this.isAdmin()){c.innerHTML='<div class="al al-d">Sin permisos.</div>';return}
    var log=getLog(),r='';
    if(!log.length)r='<div class="empty">'+ic('save',48)+'<br>Sin actividad registrada</div>';
    else{r='<table><thead><tr><th>Fecha</th><th>Usuario</th><th>Accion</th><th>Detalle</th></tr></thead><tbody>';for(var i=0;i<Math.min(log.length,100);i++){var x=log[i];r+='<tr><td>'+fdt(x.fecha)+'</td><td><b>'+esc(x.user)+'</b></td><td><span class="badge b-bl">'+esc(x.action)+'</span></td><td>'+esc(x.detail)+'</td></tr>'}r+='</tbody></table>'}
    c.innerHTML='<div class="ph"><h2>Registro de Actividad</h2><button class="btn bo" id="clrLog">Limpiar log</button></div><div class="card"><div class="card-b" style="padding:0;overflow-x:auto">'+r+'</div></div>';
    var self=this;
    if($('clrLog'))$('clrLog').onclick=function(){if(confirm('Limpiar todo el registro?')){DB.s('log',[]);self.notify('Log limpiado','ok');self.go('actividad')}};
  },

  // USUARIOS (solo admin)
  pg_usuarios:function(c){
    if(!this.isAdmin()){c.innerHTML='<div class="al al-d">No tiene permisos para ver esta pagina.</div>';return}
    var u=DB.gU(),self=this,sa=this.isSuperAdmin(),r='';
    var rolNames={'SUPERADMIN':'Super Admin','ADMIN_SEDE':'Admin Sede','ADMIN_DEPTO':'Admin Depto','USER':'Usuario'};
    if(!u.length)r='<div class="empty">No hay usuarios</div>';
    else{r='<table><thead><tr><th>Usuario</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Sede</th><th>Depto</th>'+(sa?'<th></th>':'')+'</tr></thead><tbody>';
    for(var i=0;i<u.length;i++){var x=u[i];r+='<tr><td><b>'+esc(x.username)+'</b></td><td>'+esc(x.nombre||'')+' '+esc(x.apellido||'')+'</td><td>'+esc(x.email)+'</td><td><span class="badge '+(x.rol==='SUPERADMIN'?'b-er':x.rol==='ADMIN_SEDE'?'b-ac':x.rol==='ADMIN_DEPTO'?'b-pu':'b-bl')+'">'+(rolNames[x.rol]||x.rol)+'</span></td><td>'+sn(x.sede_id)+'</td><td>'+dn(x.departamento_id)+'</td>'+(sa?'<td class="act"><button class="btn ber bsm du" data-id="'+x.id+'">'+ic('del',14)+'</button></td>':'')+'</tr>'}
    r+='</tbody></table>'}
    // Formulario crear usuario
    var sedes=DB.gS(),deps=DB.gD();
    var so='',dpo='';for(var j=0;j<sedes.length;j++)so+='<option value="'+sedes[j].id+'">'+esc(sedes[j].nombre)+'</option>';
    for(var k=0;k<deps.length;k++)dpo+='<option value="'+deps[k].id+'">'+esc(deps[k].nombre)+'</option>';
    c.innerHTML='<div class="ph"><h2>Usuarios del Sistema ('+u.length+')</h2></div><div class="card" style="margin-bottom:20px"><div class="card-h">Crear Nuevo Usuario</div><div class="card-b"><div id="ue" class="al al-d hid"></div><form id="uf"><div class="fr3"><div class="fg"><label>Usuario</label><input type="text" class="fc" id="uu" required></div><div class="fg"><label>Email</label><input type="email" class="fc" id="uem" required></div><div class="fg"><label>Contrasena</label><input type="password" class="fc" id="upw" required></div></div><div class="fr3"><div class="fg"><label>Nombre</label><input type="text" class="fc" id="unm"></div><div class="fg"><label>Apellido</label><input type="text" class="fc" id="uap"></div><div class="fg"><label>Rol</label><select class="fc" id="url"><option value="USER">Usuario</option><option value="ADMIN_DEPTO">Admin Departamento</option><option value="ADMIN_SEDE">Admin Sede</option>'+(sa?'<option value="SUPERADMIN">Super Admin</option>':'')+'</select></div></div><div class="fr"><div class="fg"><label>Sede</label><select class="fc" id="usd"><option value="">Sin sede</option>'+so+'</select></div><div class="fg"><label>Departamento</label><select class="fc" id="udp"><option value="">Sin depto</option>'+dpo+'</select></div></div><button type="submit" class="btn bp">'+ic('add',14)+' Crear Usuario</button></form></div></div><div class="card"><div class="card-b" style="padding:0;overflow-x:auto">'+r+'</div></div>';
    $('uf').onsubmit=function(ev){ev.preventDefault();var er=$('ue');var d={username:$('uu').value.trim(),email:$('uem').value.trim(),password:$('upw').value,nombre:$('unm').value.trim(),apellido:$('uap').value.trim(),rol:$('url').value,sede_id:+$('usd').value||null,departamento_id:+$('udp').value||null};if(!d.username||!d.email||!d.password){er.textContent='Complete usuario, email y contrasena.';er.className='al al-d';return}if(d.password.length<8){er.textContent='Contrasena minimo 8 caracteres.';er.className='al al-d';return}if(DB.gUbyN(d.username)){er.textContent='Usuario ya existe.';er.className='al al-d';return}if(DB.gUbyE(d.email)){er.textContent='Email ya registrado.';er.className='al al-d';return}DB.cU(d);self.notify('Usuario creado: '+d.username,'ok');self.go('usuarios')};
    document.querySelectorAll('.du').forEach(function(b){b.onclick=function(){var id=+b.getAttribute('data-id');if(id===self.user.id){alert('No puede eliminar su propia cuenta.');return}if(confirm('Eliminar este usuario?')){DB.s('u',DB.gU().filter(function(x){return x.id!==id}));self.notify('Usuario eliminado','er');self.go('usuarios')}}});
  }
};
